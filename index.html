<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calcu</title>
    <link rel="stylesheet" type="text/css" href="index.css" />
    <script src="index.ts" defer></script>
  </head>
  <body>
    <main class="calc">
      <section class="calc-menu">
        <div class="calc-menu-title">KUN Calc</div>
        <div class="calc-menu-control">
          <button
            class="calc-menu-control-history"
            title="显示计算历史"
          ></button>
          <button class="calc-menu-control-theme" title="切换主题样式">
            <div
              class="calc-menu-control-theme-mode calc-menu-control-theme-mode-dark"
              data-theme="dark"
            ></div>
            <div
              class="calc-menu-control-theme-mode calc-menu-control-theme-mode-light hidden_calc-menu-control-theme-mode"
              data-theme="light"
            ></div>
          </button>
        </div>
      </section>
      <section class="calc-screen">
        <div class="calc-screen-process"></div>
        <div class="calc-screen-current"></div>
      </section>
      <section class="calc-mani"></section>
      <aside class="calc-history"></aside>
    </main>

    <footer class="footer">Created with kun</footer>
  </body>
</html>
